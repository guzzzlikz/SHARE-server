<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>
        Skebob :)
        <input type="file" id="videoFile">
        <button id="submit">sub</button>
        <script>
            const fileInput = document.querySelector('#videoFile'); // <input type="file" id="fileInput" />

            fileInput.addEventListener('change', async () => {
                const file = fileInput.files[0]; // Get first selected file
                const formData = new FormData();
                formData.append('file', file);
                const user = {
                    email: "example228@gmail.com",
                    password: "pososi"
                };// Key must match @RequestPart("file")
                const res = await fetch('http://localhost:8080/api/auth/login', {
                    headers: {
                        "Content-Type": "application/json"
                    },
                    method: 'POST',
                    body: JSON.stringify(user)
                })
                const data = await res.json();
                const token = data.token
                console.log(token)
                const response = await fetch('http://localhost:8080/api/ai/check?lat=50.4501&lng=30.5234', {
                    headers: {
                        "Authorization": "Bearer " + token
                    },
                    method: 'POST',
                    body: formData,
                });

                const result = await response.text();
                console.log(result);
            });
        </script>
    </h1>
</body>
</html>
